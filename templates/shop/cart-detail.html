<h2>Your Cart</h2>
{% for item in cart.items.all %}
<p>{{ item.product.name }} - {{ item.quantity }} x ${{ item.product.price }} = ${{ item.total_price }}
<a href="{% url 'remove_from_cart' item.product.id %}">Remove</a></p>
{% empty %}
<p>Your cart is empty.</p>
{% endfor %}
<p><strong>Total: ${{ cart.total_price }}</strong></p>
