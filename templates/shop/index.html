{# index.html #}
{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<section class="py-5">
    <div class="container px-4 px-lg-5 mt-5">
        <div class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center">
            {% for product in products %}
            <div class="col mb-5">
                <div class="card h-100 shadow-sm">
                    {% if product.image %}
                        <img class="card-img-top" src="{{ product.image.url }}" alt="{{ product.name }}" style="height: 200px; object-fit: cover;">
                    {% else %}
                        <img class="card-img-top" src="https://via.placeholder.com/200" alt="No image">
                    {% endif %}

                    <div class="card-body p-4">
                        <div class="text-center">
                            <h5 class="fw-bolder">{{ product.name }}</h5>
                            <p class="text-muted small">{{ product.desc }}</p>
                            <span class="text-primary fw-bold">${{ product.price }}</span>
                        </div>
                    </div>

                    <div class="card-footer p-4 pt-0 border-top-0 bg-transparent">
                        <div class="text-center">
                            <a class="btn btn-outline-dark mt-auto w-100" href="{% url 'add_to_cart' product.id %}">
                                Add To Cart
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center">
                <p class="lead">No ice cream found.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
